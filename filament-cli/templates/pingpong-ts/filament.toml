# Filament Module Manifest
#
# This manifest is embedded into the WASM module and describes the exported plugins.

[metadata]
name = "{{name}}"
version = "0.1.0"
description = "Ping-pong module for Filament."

[[plugins]]
name = "ping"
version = "0.1.0"
description = "Sends ping events on a timer"
capabilities = ["filament:channel/write", "filament:timer/arm", "filament:logger/log"]
subscribes = ["sys/lifecycle/init"]
publishes = ["ping"]

[[plugins]]
name = "pong"
version = "0.1.0"
description = "Responds to ping events"
capabilities = ["filament:channel/write", "filament:logger/log"]
subscribes = ["ping"]
publishes = ["pong"]
